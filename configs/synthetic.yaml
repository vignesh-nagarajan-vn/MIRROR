# MIRROR config for the SYNTHETIC end-to-end validation run.
#
# This trains and evaluates the real pipeline on the git-ignored synthetic
# dataset generated by:
#   python -m datasets.scripts.make_synthetic_samples \
#       --out datasets/raw/synthetic_chestxray14 -n 1400 --seed 42
#
# It exists to exercise the full train -> checkpoint -> evaluate -> ablation
# machinery on real (if synthetic) data and confirm it produces well-formed
# metrics. The resulting numbers characterise the PIPELINE on synthetic
# CXR-like images; they are NOT a ChestX-ray14 benchmark. For real numbers,
# point data.data_root at the NIH release (see datasets/scripts/download_chestxray14.py)
# and train on a GPU.

model:
  backbone: densenet121
  num_classes: 14
  pretrained: true
  dropout: 0.2
  checkpoint_path: null

explain:
  method: gradcam
  target_layer: null
  overlay_alpha: 0.45
  colormap: jet

report:
  provider: template
  model: claude-haiku-4-5
  max_tokens: 1024
  temperature: 0.2
  confidence_threshold: 0.5

data:
  dataset: chestxray14
  data_root: datasets/raw/synthetic_chestxray14
  image_size: 224
  batch_size: 32
  num_workers: 0            # 0 = safest on Windows (no DataLoader worker spawn)

train:
  epochs: 6
  lr: 0.0003
  weight_decay: 0.00001
  device: cuda             # auto-falls back to cpu here
  output_dir: models/checkpoints
  seed: 42
